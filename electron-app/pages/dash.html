<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body style="background-color: white;" >
    <div class="app-layout">
    
        <!-- Side Nav -->
        <aside>
            <div id="mySideNav" class="sideNav">
                <div>
                    <img class="nav-image" src="../images/medina-county.png" alt="Logo" width="100px" height="100px">
                    <button id="collapseSideBtn" class="collapse-side-btn" style="font-size: 1.25rem;">☰</button>
                </div>
                    
                <a href="./accountOverview.html">Account</a>
                <a href="./dash.html">Dashboard</a>
                <button class="dropdown-btn">Tickets 
                    <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="./dash.html?view=open">Open Tickets</a>
                    <a href="./dash.html?view=recent">Recent Tickets</a>
                    <a href="./dash.html?view=all">All Tickets</a>
                </div>
                <a href="./archive.html">Archive</a>
            </div>
        </aside>
        <main class="main-content-dash">
            <!-- New Ticket btn and search for ticket section -->
            <section class="very-top-section">
                <div class="top-new-tick-and-search">
                    <div>
                        <button id="top-new-ticket-btn" class="top-new-ticket-btn" onClick="document.location='newTicket.html'">New Ticket</button>
                    </div>

                    <div>
                        <input type="text" id="search-ticket-input" class="top-search-ticket-input" placeholder="Search for a ticket # or name...">
                    </div>
                    
                    <div>
                        <button id="search-ticket-btn" class="search-ticket-btn">Search</button>
                    </div>
                </div>
            </section>

            <!-- Open, Recent, Closed, All tickets section -->
            <section>
                <div class="ticket-types-section" id="ticketTabs">
                    <div>
                        <button id="open-tab" class="open-btn-tabs-section" data-view="open">View Open</button>
                    </div>
                    <div>
                        <button id="tab" class="recent-btn-tabs-section" data-view="recent">View Recent</button>
                    </div>
                    <div>
                        <button id="tab" class="all-btn-tabs-section" data-view="all">View All</button>
                    </div>
                </div>
            </section>

            <!-- New Ticket and number of tickets in certain tab? -->
            <section>
                <div class="main-new-tick-section">
                    <div>
                        <button class="main-new-ticket-btn" onClick="document.location='newTicket.html'">New Ticket</button>
                    </div>
                    <div class="current-tickets-counter" id="num-of-tickets">
                        <p>0 Tickets</p>
                    </div>
                </div>
            </section>

            <!-- Table for showing tickets -->
            <table class="ticket-info-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Ticket ID</th>
                        <th>Ticket Name</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Days Open</th>
                    </tr>
                </thead>

                <tbody id="table-body" class="table-body-section">
                    <!-- Javascript -->
                </tbody>
            </table>
        </main>

    </div>
    <script src="../js/foo.js"></script>
    <script src="../js/tabs.js"></script>

</body>
</html>
