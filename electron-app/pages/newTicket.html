<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a ticket</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/newTicket.css">
</head>
<body style="background-color: white;" >
    <div class="app-layout">
    
        <!-- Side Nav -->
        <aside>
            <div id="mySideNav" class="sideNav">
                <div>
                    <img class="nav-image" src="../images/medina-county.png" alt="Logo" width="100px" height="100px">
                    <button id="collapseSideBtn" class="collapse-side-btn" style="font-size: 1.25rem;">☰</button>
                </div>
                    
                <a href="./accountOverview.html">Placeholder</a>
                <a href="./dash.html">Dashboard</a>
                <button class="dropdown-btn">Tickets 
                    <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="./dash.html?view=open">Open Tickets</a>
                    <a href="./dash.html?view=recent">Recent Tickets</a>
                    <a href="./dash.html?view=closed">Closed Tickets</a>
                    <a href="./dash.html?view=all">All Tickets</a>
                </div>
            </div>
        </aside>
        
        <main class="main-content-new-tix">
            <header class="parent-for-header" id="parent-id-for-header">
                <div class="go-back-arrow-header" id="go-back-arrow-id">
                    <button class="new-tix-header-go-back" id="header-go-back">
                        <img src="../images/blue-back-arrow.png" alt="Back Arrow">
                        Go Back
                    </button>
                </div>

                <div class="new-ticket-header" id="new-ticket-header-id">
                    New Ticket
                </div>  
            </header>

            <form class="ticket-form">
                <div class="subject-field" id="subject-field-id">
                    <label for="ticket-subject">Subject</label>
                    <input type="text" id="ticket-subject" name="subject" placeholder="Subject..." maxlength="60" required>
                </div>

                <div class="description-field" id="description-field-id">
                    <label for="ticket-description">Description</label>
                    <textarea rows="7" cols = "65" name="ticket-description" placeholder="Description..."></textarea>
                </div>

                <div class="type-of-problem" id="type-of-problem-id">
                    <label for="type-selection">Type</label>
                    <select name="type-selection" id="type-selection-id" required>
                        <option value="" disabled selected>Select a type</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>
                        <option value="network">Network</option>
                        <option value="accountsnaccess">Accounts & Access</option>
                        <option value="services">Services</option>
                        <option value="general">General</option>
                    </select>
                </div>

                <div class="priority-box" id="priority-box-id">
                    <label for="priority">Priority</label>
                    <select name="priority" id="priority-select" required>
                        <option value="" disabled selected>Select a priority</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="file-and-submit">

                    <form action="/upload-endpoint" method="POST" enctype="multipart/form-data">
                        <div class="label-file-upload">
                            <label for="file">Choose file to upload (not required)</label>
                            <input type="file" id="file" name="file"/>
                        </div>
                    </form>

                    <div class="submit-ticket-btn">
                        <button class="submit-new-ticket-btn" id="submit-ticket-btn" type="submit">Submit Ticket</button>
                    </div>

                    
                </div>
                
            </form>
            
        </main>

    </div>
    <script src="../js/foo.js"></script>
    <script src="../js/tabs.js"></script>
    <script src="../js/newTicket.js"></script>

</body>
</html>
